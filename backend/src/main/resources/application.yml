server:
  port: 8081

spring:
  application:
    name: keycloak-auth-backend
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/my-realm

keycloak:
  realm: my-realm
  auth-server-url: http://localhost:8080
  resource: my-client
  credentials:
    secret: your-client-secret-here  # Replace with your actual client secret
  use-resource-role-mappings: true
  bearer-only: true

logging:
  level:
    org.springframework.security: DEBUG
    org.keycloak: DEBUG
